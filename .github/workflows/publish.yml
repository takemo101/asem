name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches CLI package version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "Tag v$tag_version does not match CLI version $version"
            exit 1
          fi

      - name: Check whether this version is already published
        id: package-status
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          if npm view "@takemo101/asem@${version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@takemo101/asem@${version} is already published."
            echo "Skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "@takemo101/asem@${version} is not published yet."
          fi

      - name: Ensure npm supports Trusted Publishing
        if: steps.package-status.outputs.published != 'true'
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Setup Bun
        if: steps.package-status.outputs.published != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        if: steps.package-status.outputs.published != 'true'
        run: bun install --frozen-lockfile

      - name: Run checks and build dist
        if: steps.package-status.outputs.published != 'true'
        run: |
          bun run typecheck
          bun run test
          bun run check
          bun run docs:build
          bun run build

      - name: Verify CLI version
        if: steps.package-status.outputs.published != 'true'
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          test "$(bun packages/cli/src/index.ts --version)" = "$version"
          test "$(bun packages/cli/src/index.ts -v)" = "$version"

      - name: Verify publish package contents
        if: steps.package-status.outputs.published != 'true'
        run: |
          if [ ! -f packages/cli/dist/bin.js ]; then
            echo "dist/bin.js not found"
            exit 1
          fi
          if [ ! -f packages/cli/README.md ]; then
            echo "packages/cli/README.md not found"
            exit 1
          fi
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const cliPackage = require('./packages/cli/package.json');
          if (cliPackage.name !== '@takemo101/asem') {
            throw new Error(`Unexpected package name ${cliPackage.name}`);
          }
          const deps = {
            ...cliPackage.dependencies,
            ...cliPackage.optionalDependencies,
          };
          for (const [name, version] of Object.entries(deps)) {
            if (String(version).startsWith('workspace:')) {
              throw new Error(
                `Publish manifest contains workspace dependency ${name}`,
              );
            }
          }
          const platform = process.platform;
          const arch = process.arch;
          const nativePackage = `@opentui/core-${platform}-${arch}`;
          if (cliPackage.optionalDependencies?.[nativePackage] !== '0.2.1') {
            throw new Error(
              `Missing optional dependency ${nativePackage}@0.2.1`,
            );
          }
          const pack = execFileSync(
            'npm',
            ['pack', '--dry-run', '--json', './packages/cli'],
            { encoding: 'utf8' },
          );
          const [packed] = JSON.parse(pack);
          if (packed.version !== cliPackage.version) {
            throw new Error(
              `Packed version ${packed.version} does not match ` +
                `package version ${cliPackage.version}`,
            );
          }
          const files = new Set(packed.files.map((file) => file.path));
          for (const required of ['dist/bin.js', 'README.md', 'package.json']) {
            if (!files.has(required)) {
              throw new Error(`Packed package missing ${required}`);
            }
          }
          if (files.has('src/index.ts')) {
            throw new Error('Packed package must not include src/index.ts');
          }
          console.log(
            `Verified ${packed.name}@${packed.version} package contents`,
          );
          NODE

      - name: Verify installed package
        if: steps.package-status.outputs.published != 'true'
        run: |
          tmpdir="$(mktemp -d)"
          npm pack ./packages/cli --pack-destination "$tmpdir"
          tarball="$(find "$tmpdir" -name '*.tgz' -print -quit)"
          cd "$tmpdir"
          npm install "$tarball"
          bun <<'BUN'
          const native = `@opentui/core-${process.platform}-${process.arch}`;
          await import(native);
          console.log(`loaded ${native}`);
          BUN
          ./node_modules/.bin/asem --help
          package_json="$PWD/node_modules/@takemo101/asem/package.json"
          version="$(
            node -p "require(process.argv[1]).version" "$package_json"
          )"
          test "$(./node_modules/.bin/asem --version)" = "$version"

      - name: Publish to npm with Trusted Publishing
        if: steps.package-status.outputs.published != 'true'
        run: |
          cd packages/cli
          npm publish --provenance --access public
